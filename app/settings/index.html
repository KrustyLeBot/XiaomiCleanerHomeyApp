<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      body { font-family: sans-serif; padding: 16px; color: #222; }
      h2 { margin: 0 0 8px; }
      p { color: #666; line-height: 1.5; font-size: 13px; }
      button {
        padding: 8px 14px;
        margin-right: 8px;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f5f5f5;
        cursor: pointer;
      }
      textarea {
        width: 100%;
        height: 320px;
        font-family: monospace;
        font-size: 11px;
        box-sizing: border-box;
      }
      #log-count { font-size: 13px; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <h2 id="t-log-title"></h2>
    <p id="t-log-intro"></p>

    <button type="button" id="log-load" title="Load"></button>
    <button type="button" id="log-copy" title="Copy"></button>
    <button type="button" id="log-clear" title="Clear"></button>
    <div id="log-count"></div>
    <textarea id="log" readonly title="Raw MIoT log"></textarea>

    <script type="text/javascript">
      function onHomeyReady(Homey) {
        const __ = (k) => Homey.__('settings.' + k);

        document.getElementById('t-log-title').textContent = __('log_title');
        document.getElementById('t-log-intro').textContent = __('log_intro');
        document.getElementById('log-load').textContent = __('load');
        document.getElementById('log-copy').textContent = __('copy');
        document.getElementById('log-clear').textContent = __('clear');
        document.getElementById('log').placeholder = __('log_placeholder');

        const logEl = document.getElementById('log');
        const logCount = document.getElementById('log-count');

        function refreshLog() {
          Homey.api('GET', '/log', null, (err, result) => {
            if (err) { logCount.textContent = err; return; }
            logCount.textContent = result.count + ' ' + __('lines');
            logEl.value = result.csv;
          });
        }

        document.getElementById('log-load').addEventListener('click', refreshLog);
        document.getElementById('log-copy').addEventListener('click', () => {
          logEl.select();
          document.execCommand('copy');
          logCount.textContent = __('copied');
        });
        document.getElementById('log-clear').addEventListener('click', () => {
          Homey.confirm(__('confirm_clear_log'), null, (err, ok) => {
            if (!ok) return;
            Homey.api('POST', '/log/clear', null, () => {
              logEl.value = '';
              logCount.textContent = '0 ' + __('lines');
            });
          });
        });

        refreshLog();
        Homey.ready();
      }
    </script>
  </body>
</html>
